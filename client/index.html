<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="theme-color" content="#1d2128" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="LibreChat - An open source chat application with support for multiple AI models" />
    <title>LibreChat</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#1d2128';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#1d2128' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
    <script>
      window.addEventListener('load', () => {
        // 默认让页面进入沉浸模式 (隐藏按钮)
        document.body.classList.add('zen-mode');

        // 创建一个触控把手
        const toggleBtn = document.createElement('div');
        toggleBtn.style.cssText = `
          position: fixed;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 80px;         
          height: 15px;        
          background-color: rgba(169, 165, 137, 0.3); /* 半透明暗绿色 */
          border-radius: 0 0 8px 8px; 
          z-index: 999999;     
          cursor: pointer;
        `;

        // 点击事件：切换隐藏/显示状态
        toggleBtn.addEventListener('click', () => {
          document.body.classList.toggle('zen-mode');
          if (document.body.classList.contains('zen-mode')) {
            toggleBtn.style.backgroundColor = 'rgba(169, 165, 137, 0.3)';
          } else {
            toggleBtn.style.backgroundColor = 'rgba(169, 165, 137, 0.8)';
          }
        });

        document.body.appendChild(toggleBtn);
      });
    </script>
  </body>
</html>
